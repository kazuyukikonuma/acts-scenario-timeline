<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACTS｜LC8T 登錄月齡別配信情境時間軸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #F7F5F0;
    --bg2: #EDEAE3;
    --bg3: #E2DED5;
    --text: #1A1814;
    --text2: #6B6760;
    --text3: #9B9890;
    --accent: #E24B4A;
    --blue: #85B7EB;
    --border: #D5D1C8;
    --card: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px;
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
  }

  .header {
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
  }

  .controls {
    background: var(--card);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .control-row:last-child { margin-bottom: 0; }

  .control-label {
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
    min-width: 80px;
    font-weight: 500;
  }

  input[type="range"] {
    flex: 1;
    max-width: 320px;
    accent-color: var(--accent);
    height: 4px;
  }

  .age-display {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    min-width: 48px;
    background: var(--bg2);
    padding: 4px 10px;
    border-radius: 6px;
    text-align: center;
  }

  .pct-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pct-btn {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    transition: all 0.15s;
    font-weight: 500;
  }

  .pct-btn:hover { background: var(--bg3); color: var(--text); }

  .pct-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .pct-note {
    font-size: 11px;
    color: var(--text3);
    margin-left: 4px;
  }

  .summary-cards {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    min-width: 90px;
  }

  .card-label {
    font-size: 10px;
    color: var(--text2);
    margin-bottom: 5px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .card-value {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }

  .card.highlight {
    background: var(--text);
    border-color: var(--text);
  }

  .card.highlight .card-label { color: rgba(255,255,255,0.6); }
  .card.highlight .card-value { color: #fff; }

  .chart-wrap {
    background: var(--card);
    border-radius: 12px;
    padding: 20px 24px 16px;
    border: 1px solid var(--border);
    overflow-x: auto;
  }

  .chart-inner {
    min-width: 560px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 5px;
  }

  .row-label {
    width: 96px;
    flex-shrink: 0;
    text-align: right;
  }

  .row-label-name {
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
  }

  .row-label-theme {
    font-size: 10px;
    color: var(--text3);
  }

  .row-label.skipped .row-label-name { opacity: 0.35; }
  .row-label.skipped .row-label-theme { opacity: 0.3; }

  .bar-wrap {
    flex: 1;
    height: 36px;
    position: relative;
    background: var(--bg2);
    border-radius: 5px;
    overflow: hidden;
  }

  .bar-wrap.skipped { opacity: 0.25; }

  .bar-bg {
    position: absolute;
    top: 5px;
    height: 26px;
    border-radius: 4px;
    pointer-events: none;
  }

  .dot {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    z-index: 2;
    transition: transform 0.1s;
    cursor: default;
  }

  .dot:hover { transform: translate(-50%, -50%) scale(1.5); }

  .median-line {
    position: absolute;
    top: 0;
    height: 100%;
    width: 1.5px;
    background: var(--blue);
    opacity: 0.7;
    z-index: 1;
  }

  .cursor-line {
    position: absolute;
    top: 0;
    height: 100%;
    width: 2px;
    background: var(--accent);
    opacity: 0.8;
    z-index: 3;
    transform: translateX(-50%);
    transition: left 0.1s;
  }

  .bar-label {
    position: absolute;
    top: 2px;
    font-size: 10px;
    font-weight: 500;
    padding-left: 4px;
    white-space: nowrap;
    z-index: 4;
    pointer-events: none;
  }

  .skip-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    padding-left: 10px;
    font-size: 10px;
    color: var(--text3);
  }

  .axis {
    position: relative;
    height: 24px;
    margin-left: 106px;
    margin-top: 4px;
  }

  .axis-tick {
    position: absolute;
    transform: translateX(-50%);
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
  }

  .legend {
    display: flex;
    gap: 16px;
    margin-top: 14px;
    flex-wrap: wrap;
    padding-left: 106px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text2);
  }

  .legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
  }

  .legend-line {
    width: 14px;
    height: 2px;
    border-radius: 1px;
  }

  .logic-box {
    margin-top: 16px;
    padding: 12px 16px;
    background: var(--bg2);
    border-radius: 8px;
    font-size: 11px;
    color: var(--text2);
    line-height: 1.9;
    border-left: 3px solid var(--text3);
  }

  .logic-box strong {
    color: var(--text);
    font-size: 12px;
    display: block;
    margin-bottom: 4px;
  }

  .footer {
    margin-top: 16px;
    font-size: 10px;
    color: var(--text3);
    text-align: right;
  }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>ACTS｜LC8T 登錄月齡別配信情境時間軸</h1>
  <p>依發展主題順序配信。切入月齡以商品適用年齡下限為基準。調整登錄月齡與配信終止基準，確認各商品的配信情境。</p>
</div>

<div class="controls">
  <div class="control-row">
    <span class="control-label">登錄月齡</span>
    <input type="range" min="0" max="72" value="10" id="ageSlider" step="1">
    <span class="age-display" id="ageLabel">10M</span>
  </div>
  <div class="control-row">
    <span class="control-label">配信終止基準</span>
    <div class="pct-btns">
      <button class="pct-btn" id="btn-P50" onclick="setPct('P50')">P50</button>
      <button class="pct-btn" id="btn-P60" onclick="setPct('P60')">P60</button>
      <button class="pct-btn active" id="btn-P70" onclick="setPct('P70')">P70</button>
      <button class="pct-btn" id="btn-P75" onclick="setPct('P75')">P75</button>
      <button class="pct-btn" id="btn-P90" onclick="setPct('P90')">P90</button>
    </div>
    <span class="pct-note" id="pctNote">→ 涵蓋70%的購買者</span>
  </div>
</div>

<div class="summary-cards" id="summaryCards"></div>

<div class="chart-wrap">
  <div class="chart-inner" id="chartInner"></div>
</div>

<script>
const skus = [
  { name: '點讀圖鑑',    theme: '語彙啟蒙', entryAge: 6,  median: 17, P50: 17, P60: 19, P70: 23, P75: 26, P90: 45, price: 2399, color: '#1D9E75' },
  { name: '好習慣套組',  theme: '生活習慣', entryAge: 12, median: 18, P50: 18, P60: 21, P70: 23, P75: 25, P90: 46, price: 4299, color: '#3266AD' },
  { name: '語彙智育套組',theme: '語彙知育', entryAge: 12, median: 23, P50: 23, P60: 28, P70: 32, P75: 35, P90: 59, price: 4900, color: '#7F77DD' },
  { name: '好情緒EQ套組',theme: '情緒人際', entryAge: 30, median: 33, P50: 33, P60: 36, P70: 39, P75: 41, P90: 55, price: 2199, color: '#EF9F27' },
  { name: '英語Plus初階',theme: '英語啟蒙', entryAge: 12, median: 27, P50: 27, P60: 30, P70: 34, P75: 36, P90: 47, price: 4800, color: '#D4537E' },
  { name: '英語進階版',  theme: '英語進階', entryAge: 36, median: 35, P50: 35, P60: 38, P70: 44, P75: 47, P90: 60, price: 4500, color: '#639922' },
  { name: '點讀大冒險',  theme: '邏輯集中', entryAge: 36, median: 40, P50: 40, P60: 43, P70: 45, P75: 46, P90: 57, price: 2999, color: '#0F6E56' },
  { name: '數學套組',    theme: '數感邏輯', entryAge: 42, median: 45, P50: 45, P60: 49, P70: 52, P75: 54, P90: 64, price: 3200, color: '#854F0B' },
  { name: '注音拼音套組',theme: '就學準備', entryAge: 54, median: 50, P50: 50, P60: 53, P70: 57, P75: 59, P90: 68, price: 3200, color: '#993556' },
];

const pctNotes = {
  P50: '涵蓋50%的購買者',
  P60: '涵蓋60%的購買者',
  P70: '涵蓋70%的購買者',
  P75: '涵蓋75%的購買者',
  P90: '涵蓋90%的購買者'
};

let currentPct = 'P70';
let currentAge = 10;

function setPct(p) {
  currentPct = p;
  ['P50','P60','P70','P75','P90'].forEach(k => {
    const btn = document.getElementById('btn-' + k);
    btn.classList.toggle('active', k === p);
  });
  document.getElementById('pctNote').textContent = '→ ' + pctNotes[p];
  render(currentAge);
}

function buildTimeline(regAge, pctKey) {
  const results = [];
  let cursor = regAge;
  skus.forEach(sku => {
    const cutoff = sku[pctKey];
    if (regAge >= cutoff) { results.push({ sku, skipped: true, reason: '登錄時已超過' + pctKey }); return; }
    const startAge = Math.max(cursor, sku.entryAge);
    if (startAge >= cutoff) { results.push({ sku, skipped: true, reason: '前商品結束後已超過' + pctKey }); return; }
    const remaining = cutoff - startAge;
    const interval = 0.5; // 隔週 = 0.5ヶ月
    const maxCount = 4;
    const count = Math.min(maxCount, Math.max(1, Math.floor(remaining / interval) + 1));
    const duration = Math.min(2, remaining); // 最大2ヶ月の配信ウィンドウ
    const msgs = Array.from({length: count}, (_, i) => +(startAge + interval * i).toFixed(2));
    results.push({ sku, skipped: false, startAge, endAge: startAge + duration, msgs, count });
    cursor = startAge + duration;
  });
  return results;
}

function render(regAge) {
  const timeline = buildTimeline(regAge, currentPct);
  const active = timeline.filter(t => !t.skipped);
  const maxAge = active.length > 0 ? Math.max(72, active[active.length - 1].endAge + 4) : 72;

  function p(v) { return Math.min(100, Math.max(0, (v / maxAge) * 100)); }

  let html = '';

  timeline.forEach(({ sku, skipped, startAge, endAge, msgs, count, reason }) => {
    const labelClass = skipped ? 'row-label skipped' : 'row-label';
    html += `<div class="row">
      <div class="${labelClass}">
        <div class="row-label-name">${sku.name}</div>
        <div class="row-label-theme">${sku.theme}</div>
      </div>
      <div class="bar-wrap${skipped ? ' skipped' : ''}">`;

    if (skipped) {
      html += `<div class="skip-label">略過（${reason}）</div>`;
    } else {
      const bl = p(startAge), br = p(endAge);
      html += `<div class="bar-bg" style="left:${bl}%;width:${Math.max(br-bl,0.5)}%;background:${sku.color};opacity:0.15;"></div>`;
      msgs.forEach((m, i) => {
        html += `<div class="dot" style="left:${p(m)}%;background:${sku.color};" title="${m.toFixed(1)}M（第${i+1}次）NT$${sku.price.toLocaleString()}"></div>`;
      });
      html += `<div class="median-line" style="left:${p(sku.median)}%;" title="WEB中位數 ${sku.median}M"></div>`;
      html += `<div class="bar-label" style="left:${bl}%;color:${sku.color};">${Math.round(startAge)}M起 ${count}次 NT$${sku.price.toLocaleString()}</div>`;
    }

    html += `<div class="cursor-line" style="left:${p(regAge)}%;"></div>`;
    html += `</div></div>`;
  });

  const tickStep = maxAge > 70 ? 12 : 6;
  html += `<div class="axis">`;
  for (let m = 0; m <= maxAge; m += tickStep) {
    html += `<div class="axis-tick" style="left:${p(m)}%">${m}M</div>`;
  }
  html += `</div>`;

  html += `<div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#E24B4A;"></span>登錄月齡</div>
    <div class="legend-item"><span class="legend-line" style="background:#85B7EB;"></span>WEB購買中位數</div>
    <div class="legend-item">● 每個點＝1次訊息</div>
  </div>`;

  html += `<div class="logic-box">
    <strong>配信順序ロジック</strong>
    ① 發展主題順（語彙啟蒙 → 生活習慣 → 語彙知育 → 情緒人際 → 英語啟蒙 → 英語進階 → 邏輯集中 → 數感邏輯 → 就學準備）<br>
    ② 切入月齡 ＝ 商品適用年齡下限（非WEB中位數）<br>
    ③ 配信節奏 ＝ 每商品最多2個月・隔週1次・最多4次<br>
    ④ 終止基準 ＝ 選擇的百分位數 &nbsp;⑤ 超過終止基準的商品略過
  </div>`;

  document.getElementById('chartInner').innerHTML = html;

  const totalMsgs = active.reduce((s, t) => s + t.count, 0);
  const lastEnd = active.length > 0 ? active[active.length - 1].endAge : regAge;
  const duration = (lastEnd - regAge).toFixed(1);
  const skipCount = timeline.filter(t => t.skipped).length;
  const totalLTV = active.reduce((s, t) => s + t.sku.price, 0);

  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="card-label">總訊息次數</div><div class="card-value">${totalMsgs}次</div></div>
    <div class="card"><div class="card-label">配信期間</div><div class="card-value">${duration}個月</div></div>
    <div class="card"><div class="card-label">完成月齡</div><div class="card-value">${Math.round(lastEnd)}M</div></div>
    <div class="card"><div class="card-label">略過商品</div><div class="card-value">${skipCount}件</div></div>
    <div class="card highlight"><div class="card-label">最大LTV（配信対象）</div><div class="card-value">NT$${totalLTV.toLocaleString()}</div></div>
  `;
}

document.getElementById('ageSlider').addEventListener('input', function() {
  currentAge = parseInt(this.value);
  document.getElementById('ageLabel').textContent = currentAge + 'M';
  render(currentAge);
});

render(10);
</script>

<div class="footer">ACTS｜LC8T 配信設計 v1.1（隔週・最多4次・2個月）｜ Benesse Taiwan ｜ 2026-05-06</div>

</div>
</body>
</html>
